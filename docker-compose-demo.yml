version: "3.9"

services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-restore:
    image: mariadb:11
    command: >
      sh -c '
        echo "=== Initial restore on startup ==="
        mariadb -h db -u root -p$$MYSQL_ROOT_PASSWORD uni_verein < /dump/uni_verein_db.sql
        if [ $$? -ne 0 ]; then
          echo "ERROR: Initial restore failed!"
        else
          echo "Initial restore completed successfully"
        fi

        echo "=== Waiting for next restore at 03:00 ==="
        while true; do
          CURRENT_TIME=$$(date +%H:%M)
          if [ "$$CURRENT_TIME" = "03:00" ]; then
            echo "=== Nightly restore started ==="
            mariadb -h db -u root -p$$MYSQL_ROOT_PASSWORD uni_verein < /dump/uni_verein_db.sql
            if [ $$? -ne 0 ]; then
              echo "ERROR: Nightly restore failed!"
            else
              echo "Nightly restore completed successfully"
            fi
            sleep 60
          fi
          sleep 30
        done'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - /mnt/demo-dump:/dump
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      ConnectionStrings__Default: server=db;database=${DB_NAME};user=${DB_USER};password=${DB_PASSWORD}
      ConnectionStrings__Database: ${DB_NAME}
      ConnectionStrings__MysqlUser: ${DB_USER}
      ConnectionStrings__MysqlPassword: ${DB_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      CRYPTO_KEY: ${CRYPTO_KEY}
      HMAC_KEY: ${HMAC_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${VERSION}
        - VITE_APP_DEMO=true
    restart: always
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
