services:
  init-secrets:
    image: alpine/openssl
    volumes:
      - ./.env:/app/.env
    entrypoint: >
      sh -c "
        ENV_FILE=/app/.env;

        [ ! -f $$ENV_FILE ] && touch $$ENV_FILE && echo '[INIT] New .env file created.';

        check_and_set() {
          KEY=$$1;
          VALUE=$$2;
          CURRENT=$$(grep \"^$${KEY}=\" $$ENV_FILE 2>/dev/null | cut -d'=' -f2-);
          if [ -z \"$$CURRENT\" ]; then
            sed -i \"/^$${KEY}=/d\" $$ENV_FILE 2>/dev/null || true;
            echo \"$${KEY}=$${VALUE}\" >> $$ENV_FILE;
            echo \"[INIT] - $${KEY} generated\";
          else
            echo \"[INIT] - $${KEY} already exists – will not be overwritten\";
          fi
        };

        check_and_set JWT_KEY           $$(openssl rand -hex 32);
        check_and_set JWT_ISSUER        uni-verein;
        check_and_set HMAC_KEY          $$(openssl rand -base64 32);
        check_and_set CRYPTO_KEY        $$(openssl rand -base64 32);
        check_and_set DB_ROOT_PASSWORD  root_password;
        check_and_set DB_NAME           uni_verein;
        check_and_set DB_USER           uni_verein_user;
        check_and_set DB_PASSWORD       password;
        check_and_set BACKUP_PATH       ./backup
        check_and_set VERSION           1.0.1

        echo '';
        echo '[INIT] Final .env:';
        cat $$ENV_FILE;
        echo '[INIT] Setup complete!';
      "
    restart: "no"